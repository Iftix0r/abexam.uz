<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Sahifa topilmadi</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0f0f11;color:#e4e4e7;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:24px}
.code{font-size:120px;font-weight:700;background:linear-gradient(135deg,#6366f1,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;margin-bottom:16px}
h1{font-size:22px;font-weight:600;margin-bottom:10px}
p{color:#71717a;font-size:14px;margin-bottom:28px;max-width:360px}
.btn{display:inline-flex;align-items:center;gap:8px;background:#6366f1;color:#fff;padding:11px 24px;border-radius:10px;font-weight:600;font-size:14px;text-decoration:none;transition:.15s}
.btn:hover{background:#4f46e5}
.btn-ghost{background:transparent;border:1px solid #2a2a32;color:#71717a;margin-left:10px}
.btn-ghost:hover{background:#18181b;color:#e4e4e7}
</style>
</head>
<body>
<div>
  <div class="code">404</div>
  <h1>Sahifa topilmadi</h1>
  <p>Siz qidirayotgan sahifa mavjud emas yoki ko'chirilgan bo'lishi mumkin.</p>
  <a href="/" class="btn">🏠 Bosh sahifaga</a>
  <a href="javascript:history.back()" class="btn btn-ghost">← Orqaga</a>
</div>
</body>
</html>
