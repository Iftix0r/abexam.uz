{% extends 'base.html' %}
{% block title %}Email yuborildi — AbExam{% endblock %}
{% block content %}
<div style="max-width:420px;margin:80px auto;text-align:center">
  <div style="width:56px;height:56px;background:rgba(34,197,94,.12);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px">
    <i data-lucide="mail-check" style="width:24px;color:#22c55e"></i>
  </div>
  <h1 style="font-size:22px;font-weight:700;margin-bottom:8px">Email yuborildi!</h1>
  <p style="color:var(--text-muted);font-size:14px;margin-bottom:24px">Agar bu email ro'yxatdan o'tgan bo'lsa, parol tiklash havolasi yuborildi. Spam papkasini ham tekshiring.</p>
  <a href="{% url 'login' %}" style="background:var(--primary-color);color:#fff;padding:10px 24px;border-radius:10px;font-weight:600;font-size:14px">Loginga qaytish</a>
</div>
{% endblock %}
{% block extra_js %}<script>lucide.createIcons();</script>{% endblock %}
