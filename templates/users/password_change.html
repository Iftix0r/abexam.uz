{% extends 'base.html' %}

{% block title %}Parolni o'zgartirish - AbExam{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 0 auto;">
    <a href="{% url 'profile' %}" style="display: flex; align-items: center; gap: 8px; color: var(--text-muted); text-decoration: none; margin-bottom: 2rem; font-size: 0.9rem;">
        <i data-lucide="arrow-left" style="width: 16px;"></i> Profilga qaytish
    </a>

    <div class="card">
        <h1 style="font-size: 1.5rem; font-weight: 600; margin-bottom: 2rem; display: flex; align-items: center; gap: 10px;">
            <i data-lucide="lock" style="width: 22px; color: var(--primary-color);"></i>
            Parolni o'zgartirish
        </h1>

        <form method="POST">
            {% csrf_token %}
            {% for field in form %}
            <div style="margin-bottom: 1.25rem;">
                <label style="display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.5rem;">{{ field.label }}</label>
                <input type="password" name="{{ field.html_name }}"
                    style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); border-radius: 10px; padding: 0.8rem 1rem; color: var(--text-color); font-size: 0.95rem; outline: none; transition: border-color 0.2s;"
                    onfocus="this.style.borderColor='var(--primary-color)'"
                    onblur="this.style.borderColor='var(--border-color)'"
                    required>
                {% if field.errors %}
                <p style="color: #e74c3c; font-size: 0.8rem; margin-top: 0.4rem;">{{ field.errors.0 }}</p>
                {% endif %}
            </div>
            {% endfor %}

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.9rem; border-radius: 10px; font-weight: 600; margin-top: 0.5rem;">
                Saqlash
            </button>
        </form>
    </div>
</div>
{% endblock %}
