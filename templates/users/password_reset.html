{% extends 'base.html' %}
{% block title %}Parolni tiklash — AbExam{% endblock %}
{% block content %}
<div style="max-width:420px;margin:80px auto;text-align:center">
  <div style="width:56px;height:56px;background:rgba(66,133,244,.12);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px">
    <i data-lucide="lock" style="width:24px;color:var(--primary-color)"></i>
  </div>
  <h1 style="font-size:22px;font-weight:700;margin-bottom:8px">Parolni tiklash</h1>
  <p style="color:var(--text-muted);font-size:14px;margin-bottom:28px">Email manzilingizni kiriting, tiklash havolasini yuboramiz</p>

  <form method="post" style="background:var(--card-bg);border:1px solid var(--border-color);border-radius:16px;padding:24px;text-align:left">
    {% csrf_token %}
    <div style="margin-bottom:16px">
      <label style="display:block;font-size:12px;color:var(--text-muted);margin-bottom:6px;font-weight:500">Email manzil</label>
      <input type="email" name="email" required placeholder="email@example.com"
        style="width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border-color);border-radius:10px;padding:10px 14px;color:var(--text-color);font-size:14px;outline:none">
    </div>
    <button type="submit" style="width:100%;background:var(--primary-color);color:#fff;padding:11px;border-radius:10px;font-weight:600;border:none;cursor:pointer;font-size:14px">
      Havola yuborish
    </button>
  </form>
  <a href="{% url 'login' %}" style="display:block;margin-top:16px;font-size:13px;color:var(--text-muted)">← Loginga qaytish</a>
</div>
{% endblock %}
{% block extra_js %}<script>lucide.createIcons();</script>{% endblock %}
