{% extends 'base.html' %}

{% block title %}Parol o'zgartirildi - AbExam{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 4rem auto; text-align: center;">
    <div class="card">
        <div style="width: 64px; height: 64px; background: rgba(52,168,83,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
            <i data-lucide="check-circle" style="width: 32px; color: #34a853;"></i>
        </div>
        <h1 style="font-size: 1.5rem; font-weight: 600; margin-bottom: 0.75rem;">Parol muvaffaqiyatli o'zgartirildi!</h1>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Keyingi safar yangi parolingiz bilan kiring.</p>
        <a href="{% url 'profile' %}" class="btn btn-primary" style="padding: 0.75rem 2rem; border-radius: 10px; font-weight: 600; text-decoration: none;">
            Profilga qaytish
        </a>
    </div>
</div>
{% endblock %}
